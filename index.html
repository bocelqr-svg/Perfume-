<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDkzh65Jf5vgNBSD39-k9pNm",
  authDomain: "r7-aroma-60f9d.firebaseapp.com",
  databaseURL: "https://r7-aroma-60f9d-default-rtdb.firebaseio.com",
  projectId: "r7-aroma-60f9d",
  storageBucket: "r7-aroma-60f9d.appspot.com",
  messagingSenderId: "487567321349",
  appId: "1:487567321349:web:9d405cc39af8",
  measurementId: "G-22MHLD2688"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const WHATSAPP_NUMBER = "8294379911";
const ADMIN_PASS = "203031";

let products = [];
let imageData = '';
let pendingDeleteId = null;
let currentPurchase = null;

function handleFile(input){
if(input.files && input.files[0]){
const reader = new FileReader();
reader.onload=e=>{
imageData=e.target.result;
};
reader.readAsDataURL(input.files[0]);
}
}

window.saveProduct=function(e){
e.preventDefault();

const product={
name:document.getElementById('p-name').value.toUpperCase(),
price:parseFloat(document.getElementById('p-price').value).toFixed(2),
image:imageData
};

push(ref(db,"perfumes"),product);
}

onValue(ref(db,"perfumes"),snapshot=>{

products=[];

snapshot.forEach(child=>{
products.push({
id:child.key,
...child.val()
});
});

render();

});

window.executeDelete=function(){

remove(ref(db,"perfumes/"+pendingDeleteId));

}

window.checkout=function(id){

const product=products.find(p=>p.id===id);
currentPurchase=product;

const date=new Date().toLocaleDateString();

document.getElementById('inv-name').innerText=product.name;
document.getElementById('inv-price').innerText="$"+product.price;
document.getElementById('inv-date').innerText=date;

document.getElementById('invoice-modal').classList.remove('hidden');

}

window.sendToWhatsApp=function(){

const message=`Hola quiero comprar ${currentPurchase.name} precio $${currentPurchase.price}`;

window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`);

}

function render(){

const grid=document.getElementById('product-grid');

if(products.length===0){
grid.innerHTML="";
return;
}

grid.innerHTML=products.map(p=>`

<div class="perfume-card neon-border group">

<div class="h-80 flex items-center justify-center p-10">
<img src="${p.image}" class="max-h-full">
</div>

<div class="p-6">

<h3 class="text-xl font-bold">${p.name}</h3>

<p class="text-emerald-500 text-2xl">$${p.price}</p>

<button onclick="checkout('${p.id}')" class="btn-emerald w-full py-3 rounded-xl">
COMPRAR
</button>

</div>

</div>

`).join("");

}

</script>
