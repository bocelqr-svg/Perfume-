<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R7 AROMA</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
color:#10b981;
margin-top:20px;
}

.card{
background:#0f0f0f;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

</style>

</head>

<body class="p-6">

<div class="logo">
R7 AROMA
</div>

<div class="text-center mt-6">

<button onclick="abrirAdmin()" 
class="bg-emerald-500 text-black px-6 py-3 rounded-xl font-bold">

Panel Admin

</button>

</div>

<div id="productos" class="grid md:grid-cols-3 gap-10 mt-10"></div>

<!-- PANEL ADMIN -->

<div id="panel" class="hidden mt-10 max-w-md mx-auto bg-black p-6 rounded-xl border border-emerald-500">

<h2 class="text-xl mb-4 text-center">
Agregar Perfume
</h2>

<input type="file" id="imagen" class="mb-3 w-full">

<input type="text" id="nombre" placeholder="Nombre perfume" class="mb-3 w-full p-2 text-black">

<input type="number" id="precio" placeholder="Precio" class="mb-3 w-full p-2 text-black">

<button onclick="subirPerfume()" class="bg-emerald-500 text-black w-full py-3 rounded-xl">

Publicar

</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {

getStorage,
ref as sRef,
uploadBytes,
getDownloadURL

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "TU_AUTH_DOMAIN",
databaseURL: "TU_DATABASE_URL",
projectId: "TU_PROJECT_ID",
storageBucket: "TU_STORAGE_BUCKET",
messagingSenderId: "TU_SENDER_ID",
appId: "TU_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const storage = getStorage(app);

let perfumes=[];


function render(){

const cont=document.getElementById("productos");

cont.innerHTML="";

perfumes.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" class="w-full h-72 object-contain bg-black p-6">

<div class="p-6">

<h2 class="text-xl font-bold">${p.nombre}</h2>

<p class="text-emerald-400 text-2xl mt-2">$${p.precio}</p>

<button onclick="comprar('${p.nombre}','${p.precio}')" 
class="bg-emerald-500 text-black w-full mt-4 py-3 rounded-xl font-bold">

Comprar

</button>

<button onclick="eliminar('${p.id}')" 
class="bg-red-500 w-full mt-2 py-2 rounded-xl">

Eliminar

</button>

</div>

</div>

`;

});

}

onValue(ref(db,"perfumes"),snap=>{

perfumes=[];

snap.forEach(child=>{

perfumes.push({

id:child.key,
...child.val()

});

});

render();

});


window.abrirAdmin=function(){

let pass=prompt("Clave admin");

if(pass!="203031"){
alert("Clave incorrecta");
return;
}

document.getElementById("panel").classList.remove("hidden");

}


window.subirPerfume=async function(){

let file=document.getElementById("imagen").files[0];

let nombre=document.getElementById("nombre").value;

let precio=document.getElementById("precio").value;

if(!file){
alert("Selecciona una imagen");
return;
}

const imagenRef=sRef(storage,"perfumes/"+Date.now()+file.name);

await uploadBytes(imagenRef,file);

let url=await getDownloadURL(imagenRef);

push(ref(db,"perfumes"),{

nombre:nombre,
precio:precio,
imagen:url

});

alert("Perfume agregado");

}


window.eliminar=function(id){

let pass=prompt("Clave admin");

if(pass!="203031"){
alert("Clave incorrecta");
return;
}

remove(ref(db,"perfumes/"+id));

}


window.comprar=function(nombre,precio){

let msg=`Hola quiero comprar ${nombre} precio $${precio}`;

window.open(`https://wa.me/18294379911?text=${encodeURIComponent(msg)}`);

}

</script>

</body>

</html>
