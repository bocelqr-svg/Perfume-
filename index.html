<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R7 AROMA</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:black;
color:white;
font-family:Arial;
}

.card{
background:#0a0a0a;
border:1px solid #10b981;
border-radius:20px;
padding:20px;
text-align:center;
}

.btn{
background:#10b981;
color:black;
padding:10px;
border-radius:10px;
font-weight:bold;
width:100%;
}

</style>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold text-center mb-10 text-emerald-500">
R7 AROMA
</h1>

<div class="text-center mb-10">
<button onclick="admin()" class="btn">
Panel Admin
</button>
</div>

<div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBDkzh65Jf5vgNBSD39",
authDomain: "r7-aroma-60f9d.firebaseapp.com",
databaseURL: "https://r7-aroma-60f9d-default-rtdb.firebaseio.com",
projectId: "r7-aroma-60f9d",
storageBucket: "r7-aroma-60f9d.appspot.com",
messagingSenderId: "487567321349",
appId: "1:487567321349:web:9d405cc39af8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let productos=[];

function render(){

const grid=document.getElementById("grid");

grid.innerHTML="";

productos.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.image}" style="height:200px;margin:auto">

<h2 class="text-xl mt-4">${p.name}</h2>

<p class="text-emerald-400 text-2xl">$${p.price}</p>

<button onclick="comprar('${p.name}','${p.price}')" class="btn mt-4">
Comprar
</button>

<button onclick="borrar('${p.id}')" class="btn mt-2 bg-red-500">
Eliminar
</button>

</div>

`;

})

}

onValue(ref(db,"perfumes"),snapshot=>{

productos=[];

snapshot.forEach(child=>{

productos.push({
id:child.key,
...child.val()
})

})

render()

})

window.admin=function(){

let pass=prompt("Clave admin")

if(pass!="203031"){
alert("Clave incorrecta")
return
}

let name=prompt("Nombre perfume")
let price=prompt("Precio")
let image=prompt("URL imagen")

push(ref(db,"perfumes"),{
name,
price,
image
})

}

window.borrar=function(id){

let pass=prompt("Clave admin")

if(pass!="203031"){
alert("Clave incorrecta")
return
}

remove(ref(db,"perfumes/"+id))

}

window.comprar=function(name,price){

let msg=`Hola quiero comprar ${name} precio $${price}`

window.open(`https://wa.me/18294379911?text=${encodeURIComponent(msg)}`)

}

</script>

</body>
</html>
